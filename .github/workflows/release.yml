name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # npm >= 11.5.1 is required for trusted publishing (OIDC)
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Verify tag matches package version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Release tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: |
          # setup-node registry-url writes an empty _authToken line that blocks OIDC
          unset NODE_AUTH_TOKEN
          npm publish --access=public --ignore-scripts --provenance
